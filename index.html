    <script>
  // Recipient phone number
  const phone = "+447307309734";

  // Get the code from URL query parameter ?code=ABC123
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');

  if (code) {
    // Redirect to native SMS app with prefilled body
    location.href = `sms:${phone}?body=PLEASE CHANGE MY DELIVERY ${encodeURIComponent(code)}`;
  } else {
    document.body.innerHTML = "No code found!";
  }
</script>
